services:
  - type: web
    name: documind-ai
    env: python
    region: oregon
    plan: free
    pythonVersion: 3.11
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run frontend/streamlit_app.py --logger.level=debug"
    envVars:
      - key: PORT
        value: 10000
